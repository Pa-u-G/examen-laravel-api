<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login</title>
  <link rel="stylesheet" href="./test.css">
  <style>
    /* Small override to center the card if test.css doesn't */
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f5f7fb; }
    .card { background:white; padding:24px; border-radius:8px; box-shadow:0 6px 18px rgba(20,20,50,0.08); width:320px; }
    label { display:block; margin-top:12px; font-weight:600; font-size:14px }
    input[type="email"], input[type="password"] { width:100%; padding:10px 12px; margin-top:6px; border:1px solid #dce3f0; border-radius:6px; box-sizing:border-box }
    button { margin-top:16px; width:100%; padding:10px; border-radius:6px; border:0; background:#2563eb; color:white; font-weight:700 }
    .message { margin-top:12px; font-size:14px }
    .error { color:#b91c1c }
    .success { color:#065f46 }
  </style>
</head>
<body>
  <main class="card" role="main">
    <h2 style="margin:0 0 8px 0">Iniciar sesión</h2>
    <form id="loginForm" autocomplete="off">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required />

      <button type="submit">Entrar</button>
    </form>

    <div id="message" class="message" aria-live="polite"></div>

    <p style="margin-top:14px;font-size:13px;color:#555">¿No tienes cuenta? Usa el seeder o crea una desde la API.</p>
  </main>

  <p>user: a@a.a passwd: a</p>

  <script src="./login.js"></script>
</body>
</html>
